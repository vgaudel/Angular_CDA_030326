<h2>Connexion</h2>


<form #formUser="ngForm">

    <div>
        <label>Username</label>
        <input 
            type="text"
            name="username"
            [(ngModel)]="username"
            required
        />
    </div>

    <div>
        <label>Password</label>
        <input 
            type="password"
            name="password"
            [(ngModel)]="password"
            required
        />
    </div>
<br>
    <button type="submit" [disabled]="formUser.invalid">Se connecter </button>
</form>
