<h2>Connexion</h2>


<form #formUser="ngForm">

    <div class="form-group row">
        <label class="col-sm-4 text-sm-end">Username</label>
        <div class="col-sm-8  col-md-6 col-xl-4">
            <input type="text" class="form-control  mb-1" name="username" [(ngModel)]="username" required />
        </div>
    </div>

    <div class="form-group row">
        <label class="col-sm-4 text-sm-end">Password</label>
        <div class="col-sm-8 col-md-6 col-xl-4">
            <input type="password" class="form-control  mb-1" name="password" [(ngModel)]="password" required />
        </div>
    </div>
    <br>
    <button type="submit" [disabled]="formUser.invalid">Se connecter </button>
</form>
